<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsove Product Card</title>
    <style>
        
/* Mobile-First */

 body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:#fff;
  width:95%;
  max-width:350px;
  border-radius:15px;
  box-shadow:0px 0px 9px 4px rgba(0,0,0,0.1);
  overflow:hidden;
  padding: 1rem;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.image-container{
  position:relative;
}

.image-container img{
  width:100%;
  height:auto;
  display:block;
}

.badge {
    background-color: red;
    border-radius: 2rem;
    color: white;
    font-size: 0.7rem;
    padding: 0.4rem;
    position: absolute;
    top: 0;
}

.description {
    margin-top: 0.5rem;
    font-size: 0.9rem;
}

#old-price {
    color: grey;
    text-decoration: line-through;
}

.quantity-container {
    margin-top: 0.5rem;
}

#minus, #plus {
    cursor: pointer;
}

.add-btn, .add-cart {
    margin-top: 0.5rem;
    background-color: green;
    border: none;
    font-size: 1.1rem;
    padding: 0.2rem 2rem;
    border-radius: 1rem;
    cursor: pointer;
}

.add-cart {
    display: none;
}

/* Tablet */
@media(min-width:768px){
  .card{
    max-width:500px;
    display:flex;
  }

  .image-container{
    width:50%;
  }

  .product-content{
    width:50%;
  }
}


/* Destop */
@media(min-width:1024px){
  body{
    background:linear-gradient(135deg,#cce3de,#eaf4f4);
  }
  .card{
    max-width:700px;
  }
  h2{
    font-size:24px;
  }
  
  .price {
    margin-top: 4rem;
  }
  .description {
    margin-top: 2rem;
  }
  .quantity-container {
    margin-top: 2rem;
  }
  .add-btn {
    margin-top: 2rem;
  }
}

    </style>
</head>
<body>

    <!-- artical is used as we are creating a card  -->
    <article class="card">
       <div class="image-container">
          <img src="https://encrypted-tbn0.gstatic.com/shopping?q=tbn:ANd9GcTFgP0v6T8i453f6l93lWPvG-j5mcPQwT2SGN56FGxDhog68QmWWIM21bBnzGbC07dLfjCU-oyNUj2Tlz1QwdP9tE3aqPTViQ" alt="">
          <span class="badge">20% OFF</span>
       </div>

       <div class="product-content">
         <h2 id="productName">Samsung Galaxy S25 Ultra 5G</h2>
         <span class="price" id="old-price">₹1,29,999</span>
         <span class="price" id="new-price">₹1,03,999</span>

         <div class="description">A top-tier Android flagship featuring a 6.9-inch 120Hz LTPO AMOLED display with 2,600 nits brightness and an anti-reflective coating</div>

         <div class="quantity-container">
            <button id="minus">-</button>
            <span class="qty">1</span>
            <button id="plus">+</button>
          </div>

          
       <button class="add-btn">Add</button>
       <button class="add-cart">Added to Cart</button>
   
       </div>

      
    </article>





  <!-- Javascript -->
    <script>
  
  const minusBtn = document.getElementById("minus");
  const quantity = document.querySelector(".qty");
  const plusBtn = document.getElementById("plus");
  const addCart = document.querySelector(".add-cart");
  const addBtn = document.querySelector(".add-btn");
 
  let qty = 1;

  function updateButtons() {
    minusBtn.disabled = qty <= 1
    plusBtn.disabled = qty >= 10
  }


  minusBtn.onclick = () =>  {
    if(qty > 1) {
        qty--;
        quantity.textContent = qty
       updateButtons();
    }
  }

  plusBtn.onclick = () => {
    if(qty < 10) {
        qty++;
        quantity.textContent = qty;
        console.log(quantity);
        updateButtons();
    }
  }

  updateButtons();

  addBtn.onclick = () => {
      const productName = document.getElementById("productName").textContent;
      const price = 103999;
      const totalPrice = price * qty;


      console.log("ProductName: ", productName);
      console.log("Price: " , price);
      console.log("Quantity: ", quantity);
      console.log(`Totalprice:  ${price * qty}`);

      addCart.style.display = "block";
      setTimeout(() => addCart.style.display="none", 2000)
  }


    </script>
</body>
</html>
